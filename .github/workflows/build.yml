name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Job 1: Build Tauri app (.deb, .rpm, .AppImage) ───
  build-tauri:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascript-common

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  # ─── Job 2: Build Flatpak bundle ───
  build-flatpak:
    runs-on: ubuntu-24.04
    needs: build-tauri
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-deb
          path: deb-artifact

      - name: Prepare Flatpak build files
        run: |
          DEB_FILE=$(find deb-artifact -name '*.deb' | head -1)
          cp "$DEB_FILE" dist/flatpak/bluetooth-key-sync.deb
          cp dist/nz.jmw.bluetooth-key-sync.desktop dist/flatpak/nz.jmw.bluetooth-key-sync.desktop
          cp dist/nz.jmw.bluetooth-key-sync.metainfo.xml dist/flatpak/nz.jmw.bluetooth-key-sync.metainfo.xml
          cp static/logo.svg dist/flatpak/logo.svg

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: dist/flatpak/nz.jmw.bluetooth-key-sync.yml
          bundle: nz.jmw.bluetooth-key-sync.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

  # ─── Job 3: Build Snap package ───
  build-snap:
    runs-on: ubuntu-24.04
    needs: build-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-deb
          path: deb-artifact

      - name: Prepare Snap build files
        run: |
          DEB_FILE=$(find deb-artifact -name '*.deb' | head -1)
          cp "$DEB_FILE" dist/snap/bluetooth-key-sync.deb
          cp dist/nz.jmw.bluetooth-key-sync.desktop dist/snap/nz.jmw.bluetooth-key-sync.desktop
          cp static/logo.svg dist/snap/logo.svg

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build-snap
        with:
          path: dist/snap

      - name: Upload Snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.build-snap.outputs.snap }}
          if-no-files-found: error

  # ─── Job 4: Create GitHub Release (on tags only) ───
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs: [build-tauri, build-flatpak, build-snap]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/tauri-deb/*.deb
            artifacts/tauri-appimage/*.AppImage
            artifacts/tauri-rpm/*.rpm
            artifacts/flatpak/*.flatpak
            artifacts/snap/*.snap
